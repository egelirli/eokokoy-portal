<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekolojik Yaşam Köyü — Portal Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-serif-display@5/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/nunito-sans@9/index.css">
<style>
:root{
--bg:#F3F1EB;--card:#FFFFFF;--sidebar:#1E3628;--sidebar2:#273F30;
--green:#2C5440;--green-l:#EAF2ED;--green-m:#5D9E7A;
--terra:#C4612C;--terra-l:#FAF0EB;
--amber:#D4870E;--amber-l:#FEF5E4;
--blue:#2060C0;--blue-l:#EAF1FB;
--red:#B83030;--red-l:#FDECEA;
--t1:#1A1A17;--t2:#55554D;--t3:#9A9991;
--bdr:rgba(30,54,40,.10);--bdr2:rgba(30,54,40,.06);
--serif:'DM Serif Display',Georgia,serif;
--sans:'Nunito Sans','Nunito',system-ui,sans-serif;
--r:10px;--r2:14px;
}
@media(prefers-color-scheme:dark){
:root{
--bg:#111210;--card:#1C1E1A;--sidebar:#0D1C12;
--green:#4E9A6A;--green-l:#1A2E20;--green-m:#5D9E7A;
--terra:#E07848;--terra-l:#2A1A10;
--amber:#E8A030;--amber-l:#251A08;
--blue:#5090E8;--blue-l:#0C1A36;
--red:#E05050;--red-l:#2A0E0E;
--t1:#EEECEA;--t2:#A8A79F;--t3:#686760;
--bdr:rgba(255,255,255,.10);--bdr2:rgba(255,255,255,.05);
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;display:flex;flex-direction:column}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo-name{font-family:var(--serif);font-size:15px;color:#fff;line-height:1.25;margin-bottom:2px}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.04em}
.sb-roles{padding:12px 10px 8px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-role-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;padding:0 6px;margin-bottom:6px}
.sb-role-btn{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:7px;border:none;font-family:var(--sans);font-size:11.5px;cursor:pointer;color:rgba(255,255,255,.55);background:transparent;margin-bottom:2px;transition:all .15s}
.sb-role-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.sb-role-btn.active{background:rgba(255,255,255,.13);color:#fff;font-weight:600}
.sb-role-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle}
.sb-nav{padding:10px 10px;flex:1}
.sb-nav-lbl{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.07em;text-transform:uppercase;padding:6px 8px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.55);font-size:12px;margin-bottom:1px;transition:all .15s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(255,255,255,.13);color:#fff;font-weight:600}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--terra);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}
.sb-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--green-m);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-name{font-size:11.5px;color:rgba(255,255,255,.75);font-weight:600;line-height:1.2}
.sb-user-role{font-size:10px;color:rgba(255,255,255,.35)}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-family:var(--serif);font-size:20px;color:var(--t1)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.topbar-notif{width:32px;height:32px;border-radius:8px;border:1px solid var(--bdr);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.notif-red{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--red)}
.content{padding:20px 22px;flex:1;overflow-y:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--r2);padding:16px}
.stat-card{background:var(--card);border:1px solid var(--bdr2);border-radius:var(--r2);padding:14px 16px}
.stat-val{font-family:var(--serif);font-size:26px;color:var(--t1);line-height:1}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:4px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:12px;font-weight:700;color:var(--t2);letter-spacing:.02em;text-transform:uppercase}
.sec-link{font-size:11.5px;color:var(--green);font-weight:600;cursor:pointer}
.li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr2)}
.li:last-child{border-bottom:none;padding-bottom:0}
.li:first-child{padding-top:0}
.av{width:32px;height:32px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--green);flex-shrink:0}
.li-main{flex:1;min-width:0}
.li-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:2px}
.li-sub{font-size:11.5px;color:var(--t3)}
.badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-green{background:var(--green-l);color:var(--green)}
.b-amber{background:var(--amber-l);color:var(--amber)}
.b-red{background:var(--red-l);color:var(--red)}
.b-blue{background:var(--blue-l);color:var(--blue)}
.b-terra{background:var(--terra-l);color:var(--terra)}
.b-gray{background:var(--bg);color:var(--t3);border:1px solid var(--bdr)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:var(--card);color:var(--t2);transition:all .15s}
.btn:hover{background:var(--bg);color:var(--t1)}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-sm{padding:5px 11px;font-size:11.5px;border-radius:7px}
.btn-danger{color:var(--red);border-color:rgba(184,48,48,.2)}
.input{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--t1);background:var(--card);outline:none}
.input:focus{border-color:var(--green)}
.select{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--t1);background:var(--card);outline:none}
.textarea{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--t1);background:var(--card);resize:none;outline:none}
.label{font-size:11.5px;font-weight:700;color:var(--t2);margin-bottom:5px;display:block}
.form-row{margin-bottom:12px}
.divider{height:1px;background:var(--bdr2);margin:12px 0}
.progress-bg{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:3px}
.msg-bubble{max-width:72%;padding:10px 13px;border-radius:12px;font-size:12.5px;line-height:1.5;margin-bottom:6px}
.msg-in{background:var(--bg);color:var(--t1);border-bottom-left-radius:3px}
.msg-out{background:var(--green);color:#fff;margin-left:auto;border-bottom-right-radius:3px}
.msg-time{font-size:10px;color:var(--t3);margin-top:2px}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);color:var(--t2);background:var(--card);transition:all .15s}
.chip.active{background:var(--green);border-color:var(--green);color:#fff}
.row-between{display:flex;align-items:center;justify-content:space-between}
.ph{background:var(--bg);border:1px dashed var(--bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:10.5px}
.info-row{display:flex;padding:7px 0;border-bottom:1px solid var(--bdr2)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--t3);width:120px;flex-shrink:0}
.info-val{font-size:12.5px;color:var(--t1);font-weight:500}
.switch{width:36px;height:20px;border-radius:10px;border:1px solid var(--bdr);background:var(--bg);position:relative;cursor:pointer;flex-shrink:0}
.switch.on{background:var(--green);border-color:var(--green)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .15s}
.switch.on::after{transform:translateX(16px)}
.file-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--r);border:1px solid var(--bdr2)}
.file-icon{width:32px;height:36px;background:var(--red-l);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--red);flex-shrink:0}
.konut-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.konut-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;cursor:default}
.kc-owner{background:var(--green-l);color:var(--green)}
.kc-tenant{background:var(--amber-l);color:var(--amber)}
.kc-empty{background:var(--bg);color:var(--t3);border:1px dashed var(--bdr)}
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:10px;padding-bottom:14px;position:relative}
.tl-item:last-child{padding-bottom:0}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;position:relative;z-index:1}
.tl-line{position:absolute;left:4px;top:14px;bottom:0;width:2px;background:var(--bdr);z-index:0}
.tl-item:last-child .tl-line{display:none}
.tl-content{flex:1}
.tl-title{font-size:12.5px;font-weight:600;color:var(--t1)}
.tl-meta{font-size:11px;color:var(--t3);margin-top:2px}
</style>
</head>

let currentRole='sakin',currentPage='s-dash';
function buildNav(role){
  document.getElementById('nav-area').innerHTML=`<div class="sb-nav-lbl">Menü</div>`+roles[role].nav.map(item=>`<div class="nav-item ${item.id===currentPage?'active':''}" onclick="navigate('${item.id}')">${icons[item.icon]||''}<span>${item.label}</span>${item.badge?`<span class="nav-badge">${item.badge}</span>`:''}</div>`).join('');
  const u=roles[role].user;
  document.getElementById('sb-user-area').innerHTML=`<div class="sb-avatar" style="background:${u.dot}">${u.init}</div><div><div class="sb-user-name">${u.name}</div><div class="sb-user-role">${u.sub}</div></div>`;
}
function navigate(id){
  currentPage=id;
  const s=screens[id];
  if(!s)return;
  document.getElementById('page-title').textContent=s.title;
  document.getElementById('content-area').innerHTML=s.html;
  document.getElementById('topbar-btn-area').innerHTML=s.btn?`<button class="btn btn-primary btn-sm">${s.btn}</button>`:'';
  buildNav(currentRole);
  document.getElementById('notif-dot').style.display=['s-duyuru','a-basvuru'].includes(id)?'none':'block';
}
function switchRole(role,btn){
  currentRole=role;
  document.querySelectorAll('.sb-role-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  navigate(roles[role].nav[0].id);
}
navigate('s-dash');
</script>
