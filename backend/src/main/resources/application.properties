spring.application.name=portal

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ekokoy}
spring.datasource.username=${DB_USER:ekokoy}
spring.datasource.password=${DB_PASSWORD:ekokoy}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.placeholders.super_admin_email=${SUPER_ADMIN_EMAIL:admin@ekokoy.com}
spring.flyway.placeholders.super_admin_password_hash=${SUPER_ADMIN_PASSWORD_HASH:$2b$12$VzfohjbGJA7VL/PGVbKg8.Rj.ntbR2607eJ4jZ.DuQIQ4uUhyYgBW}

# JWT
app.jwt.secret=${JWT_SECRET:ekokoy-jwt-secret-change-in-production-min-32-chars}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000}

# Mail
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
